<div class="home-layout">
  <!-- Topbar -->
  <app-topbar [isLoggedIn]="isLoggedIn" [username]="username" [avatarUrl]="avatarUrl" (loginClick)="onLoginClick()"
    (logoutClick)="logout()" (settingsClick)="onSettings()" />

  <!-- Main Content -->
  <main class="main-content">
    <div class="arena-layout">
      <!-- Menu/Action Area -->
      <app-battle-arena />

    </div>
  </main>

  <!-- Login Dialog (Modal) -->
  @if (showLoginDialog) {
  <app-login-dialog (loginSuccess)="login()" (close)="closeDialog()" />
  }

  <!-- Profile Dialog (Modal) -->
  @if (showProfileDialog) {
  <app-profile-dialog 
    [initialUsername]="username" 
    [initialAvatarUrl]="avatarUrl"
    (save)="saveProfile($event)" 
    (close)="closeProfileDialog()" />
  }
</div>
