@if (currLobby.lobby()) {
<app-in-lobby />
} @else if (joiningLobbyId) {
<app-join-lobby-password [lobbyName]="joiningLobbyName!" (onCancel)="cancelJoin()" (onJoin)="confirmJoin($event)">
</app-join-lobby-password>
} @else if (!inCreateLobbyMenu) {
<app-lobbies-browser [lobbies]="lobbies.lobbies()" [currentUser]="auth.auth()!.user.nickname"
  (onCreateLobby)="openCreateMenu()" (onJoinLobby)="joinLobby($event.lobbyId, $event.lobby)">
</app-lobbies-browser>
} @else {
<app-create-lobby [userName]="auth.auth()!.user.nickname" [initialName]="savedLobbyName"
  (onCancel)="closeCreateMenu($event)" (onCreateLobby)="createLobby($event)">
</app-create-lobby>
}
