@switch (state().type){
@case('browser'){
<app-lobbies-browser (onCreateLobby)="openCreateMenu()" (onJoinLobby)="joinLobby($event.lobbyId, $event.lobby)">
</app-lobbies-browser>
}
@case ('pass') {
<app-join-lobby-password [lobbyName]="state.name" (onCancel)="cancelJoin()" (onJoin)="confirmJoin($event)">
</app-join-lobby-password>
}
@case ('creation') {
<app-create-lobby [initialName]="savedLobbyName" [initialHasPassword]="savedHasPassword"
  (onCancel)="closeCreateMenu($event)" (onCreateLobby)="createLobby($event)">
</app-create-lobby>
}
@case ('inLobby') {
<app-in-lobby />
}
@case('inGame'){
<app-in-game></app-in-game>
}
@case('loading'){
<app-loading></app-loading>
}
}
