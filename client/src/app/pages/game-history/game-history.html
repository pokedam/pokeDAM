<app-content-header [title]="'Historial de Partidas'"></app-content-header>
<div class="content">
  <div class="games-list">
    <div class="game-item retro-box" *ngFor="let game of games">
      <div class="game-info">
        <div class="opponent">Vs {{ game.opponent }}</div>
        <div class="result" [class.win]="game.result === 'win'" [class.loss]="game.result === 'loss'" [class.draw]="game.result === 'draw'">
          {{ game.result === 'win' ? 'Victoria' : game.result === 'loss' ? 'Derrota' : 'Empate' }}
        </div>
        <div class="date">{{ game.date | date:'short' }}</div>
      </div>
      <div class="pokemons-used">
        <span *ngFor="let pokemon of game.pokemonUsed">{{ pokemon }}</span>
      </div>
    </div>
  </div>
</div>
