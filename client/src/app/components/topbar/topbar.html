<header class="topbar retro-box">
  <div class="topbar-logo" routerLink="/" style="cursor: pointer;">PokeDAM</div>

  <!-- Desktop actions -->
  <div class="topbar-actions desktop-only">
    <button class="retro-btn menu-btn play-btn" routerLink="/play">Jugar</button>
    <button class="retro-btn menu-btn" routerLink="/pc">PC</button>
    <button class="retro-btn menu-btn pokeball-btn" routerLink="/team"><span class="pokeball-icon"></span></button>
    <button class="retro-btn menu-btn profile-btn" routerLink="/profile">
      <div class="avatar-container">
        <app-avatar-circle [avatar]="user.avatarId !== null ? user.avatarId : user.nickname"></app-avatar-circle>
      </div>
      <!-- <div class="user-avatar">
        @if (user.avatarId) {
        <img [src]="getAvatarUrl()" [alt]="user.nickname" class="avatar-img" />
        } @else {
        <span class="avatar-initial">{{ getAvatarInitial() }}</span>
        }
      </div> -->
      <span class="user-name">{{ user.nickname }}</span>


    </button>
    <!-- @if (authService.auth$ | async; as auth) {
    <app-user-menu-button [auth]="auth" (settingsClick)="settingsClick.emit()" />
    } -->
  </div>

  <!-- Mobile hamburger button -->
  <button class="hamburger-btn mobile-only" (click)="toggleDrawer()" aria-label="Open menu">
    <span class="hamburger-line" [class.open]="isDrawerOpen"></span>
    <span class="hamburger-line" [class.open]="isDrawerOpen"></span>
    <span class="hamburger-line" [class.open]="isDrawerOpen"></span>
  </button>
</header>

<!-- Mobile Drawer Overlay -->
@if (isDrawerOpen) {
<div class="drawer-overlay" (click)="closeDrawer()"></div>
}

<!-- Mobile Drawer -->
<nav class="side-drawer" [class.open]="isDrawerOpen" aria-hidden="{{ !isDrawerOpen }}">
  <div class="drawer-header">
    <span class="drawer-title">Menú</span>
    <button class="drawer-close-btn" (click)="closeDrawer()" aria-label="Close menu">✕</button>
  </div>

  <!-- Nav items -->
  <ul class="drawer-nav">
    <li>
      <button class="drawer-nav-item" routerLink="/play" (click)="closeDrawer()">
        <span class="drawer-item-icon">🎮</span>
        <span>Jugar</span>
      </button>
    </li>
    <li>
      <button class="drawer-nav-item" routerLink="/pc">
        <span class="drawer-item-icon">💻</span>
        <span>PC</span>
      </button>
    </li>
    <li>
      <button class="drawer-nav-item" routerLink="/team">
        <span class="drawer-item-icon pokeball-icon"></span>
        <span>Equipo</span>
      </button>
    </li>
  </ul>

  <!-- Profile section -->
  <div class="drawer-profile-section">
    <div class="drawer-section-label">Profile</div>

    <div class="drawer-profile-info">
      <div class="drawer-avatar">
        @if (user.avatarId) {
        <img [src]="getAvatarUrl()" [alt]="user.nickname" class="drawer-avatar-img" />
        } @else {
        <span class="drawer-avatar-initial">{{ getAvatarInitial() }}</span>
        }
      </div>
      <span class="drawer-username">{{ user.nickname }}</span>
    </div>

    <div class="drawer-divider"></div>

    <!-- Settings -->
    <button class="drawer-nav-item" routerLink="/profile">
      <span class="drawer-item-icon">⚙️</span>
      <span>Profile</span>
    </button>

    <!-- Logout -->
    <!-- <button class="drawer-nav-item drawer-logout-item">
      <span class="drawer-item-icon">🚪</span>
      <span>Log Out</span>
    </button> -->
    <!-- } @else {
    Not logged in: show login button 
    <button class="drawer-nav-item drawer-login-item" (click)="onDrawerLogin()">
      <span class="drawer-item-icon">🔑</span>
      <span>Log In</span>
    </button>
    } -->
  </div>
</nav>
