<div class="user-menu-wrapper">
  @if (auth && auth.user) {
  <button class="user-menu-trigger" (click)="toggleDropdown($event)">
    <div class="user-avatar">
      <span class="avatar-initial">{{ getAvatarInitial(auth.user.nickname) }}</span>
    </div>
    <span class="user-name">{{ auth.user.nickname }}</span>
    <span class="dropdown-arrow" [class.open]="isDropdownOpen">▼</span>
  </button>
  }

  @if (isDropdownOpen) {
  <div class="dropdown-menu retro-box">
    <button class="dropdown-item" (click)="onSettings()">
      <span class="item-icon">⚙️</span>
      <span>Settings</span>
    </button>
    <div class="dropdown-divider"></div>
    <button class="dropdown-item logout-item">
      <span class=" item-icon">🚪</span>
      <span>Log Out</span>
    </button>
  </div>
  }
</div>
