<div class="modal-overlay" (click)="onClose()">
  <div class="retro-box login-dialog" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="dialog-header">
      <div class="pokeball-icon" aria-hidden="true">
        <div class="pokeball-top"></div>
        <div class="pokeball-band"></div>
        <div class="pokeball-bottom"></div>
        <div class="pokeball-button"></div>
      </div>
      <h2 class="dialog-title">Trainer Login</h2>
      <button class="close-btn retro-btn" (click)="onClose()" aria-label="Close dialog">✕</button>
    </div>

    <!-- Form -->
    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="login-username" class="retro-label">Trainer Name</label>
        <input
          id="login-username"
          type="text"
          class="retro-input"
          placeholder="Ash Ketchum"
          [(ngModel)]="username"
          name="username"
          autocomplete="username"
          [disabled]="isLoading"
        />
      </div>

      <div class="form-group">
        <label for="login-password" class="retro-label">Password</label>
        <input
          id="login-password"
          type="password"
          class="retro-input"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          [disabled]="isLoading"
        />
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="retro-btn login-submit-btn"
        [disabled]="isLoading || !username || !password"
      >
        @if (isLoading) {
          <span class="loading-dots">Loading<span class="dot1">.</span><span class="dot2">.</span><span class="dot3">.</span></span>
        } @else {
          ▶ Login
        }
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-text">or</span>
      <span class="divider-line"></span>
    </div>

    <!-- Google Login -->
    <button
      class="retro-btn google-btn"
      (click)="onLoginWithGoogle()"
      [disabled]="isLoading"
      id="google-login-btn"
    >
      <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Login with Google
    </button>

  </div>
</div>
