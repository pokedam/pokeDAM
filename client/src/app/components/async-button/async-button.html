<button [type]="type" (click)="click()" [disabled]="isDisabled" [ngClass]="buttonClass">
    @if (loading) {
    <ng-content select="[loading]"></ng-content>
    } @else {
    @if (done) {
    <ng-content select="[done]"></ng-content>
    } @else {
    <ng-content></ng-content>
    }
    }
</button>
