<div class="pc-page-container">
  <div class="pc-container">
    <div class="pc-header">
      <h2>SISTEMA DE ALMACENAMIENTO DE BILL</h2>
      <button class="close-btn" (click)="closeModal()">X</button>
    </div>

    <div class="pc-body">
      <!-- Cajas de PC -->
      <div class="pc-box">
        <div class="box-header">
          <button class="arrow-btn">&lt;</button>
          <span>CAJA 1</span>
          <button class="arrow-btn">&gt;</button>
        </div>
        <div class="grid-container">
          @for (pcPokemon of pcPokemons; track $index) {
            <div 
              class="grid-cell" 
              [class.selected]="pcPokemon.isSelected"
              (click)="toggleSelection($index)"
            >
              <img [src]="getPokemonImageUrl(pcPokemon.pokemon.pokemon)" alt="Pokemon">
              @if (pcPokemon.isSelected) {
                <div class="check-mark">✓</div>
              }
            </div>
          }
        </div>
      </div>

      <!-- Panel Lateral (Equipo y Guardar) -->
      <div class="side-panel">
        <div class="team-section">
          <h3>EQUIPO ACTUAL ({{ selectedCount }}/6)</h3>
          <div class="team-slots">
            @for (pcPokemon of pcPokemons; track $index) {
              @if (pcPokemon.isSelected) {
                <div class="team-slot" (click)="toggleSelection($index)">
                  <img [src]="getPokemonImageUrl(pcPokemon.pokemon.pokemon)" alt="Team member">
                  <span class="lvl-badge">Nv{{ pcPokemon.pokemon.lvl }}</span>
                </div>
              }
            }
          </div>
        </div>

        <div class="actions">
          <button class="retro-btn save-btn" [disabled]="selectedCount === 0" (click)="saveTeam()">
            GUARDAR EQUIPO
          </button>
          <button class="retro-btn cancel-btn" (click)="closeModal()">SALIR</button>
        </div>
      </div>
    </div>
  </div>
</div>
