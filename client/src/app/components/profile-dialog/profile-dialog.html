<div class="modal-overlay">
  <div class="retro-box profile-dialog">

    <!-- Header -->
    <div class="dialog-header">
      <div class="pokeball-icon" aria-hidden="true">
        <div class="pokeball-top"></div>
        <div class="pokeball-band"></div>
        <div class="pokeball-bottom"></div>
        <div class="pokeball-button"></div>
      </div>
      <h2 class="dialog-title">Trainer Profile</h2>
    </div>

    <!-- Form -->
    <div class="profile-form">
      <!-- Current Avatar Preview -->
      <div class="avatar-preview-section">
        <div class="avatar-circle">
          @if (selectedAvatar) {
          <img [src]="url(selectedAvatar)" alt="Current Avatar" class="avatar-img" />
          } @else {
          <span class="avatar-initial">{{ username ? username.charAt(0).toUpperCase() : '?' }}</span>
          }
        </div>
      </div>

      <!-- Username Input -->
      <div class="form-group">
        <label for="profile-username" class="retro-label">Trainer Name</label>
        <input id="profile-username" type="text" class="retro-input" placeholder="New Name" [(ngModel)]="username"
          name="username" autocomplete="off" />
      </div>

      <!-- Avatar Selection -->
      <div class="form-group">
        <label class="retro-label">Choose your Profile Picture</label>

        <!-- Search Input -->
        <input type="text" class="retro-input" placeholder="Search by name or ID..." [(ngModel)]="searchTerm"
          (ngModelChange)="filterAvatars()" name="pokemonSearch" autocomplete="off" style="margin-bottom: 8px;" />

        <div class="avatar-grid">
          @for (avatar of currentDataset; track avatar.id) {
          <button class="avatar-option" [class.selected]="selectedAvatar === avatar.id"
            (click)="selectedAvatar = avatar.id" [title]="avatar.name">
            <img [src]="url(avatar.id)" [alt]="avatar.name" />
          </button>
          }
        </div>
      </div>

      <!-- Actions -->
      <div class="dialog-actions">
        <button class="retro-btn save-btn" (click)="onSave()" [disabled]="!username.trim()">
          ▶ Save Changes
        </button>
      </div>

    </div>
  </div>
</div>
