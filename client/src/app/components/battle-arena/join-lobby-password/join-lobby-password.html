<div class="lobby-header">
    <h2>Join Room</h2>
    <div class="header-actions">
        <button class="retro-btn cancel-btn" (click)="cancel()">Back</button>
    </div>
</div>

<div class="form-container"
    style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="retro-box form-box"
        style="width: 450px; background-color: var(--pkmn-gb-light); padding: 30px; box-shadow: 4px 4px 0px rgba(0,0,0,0.1);">
        
        <div class="form-group" style="text-align: center; margin-bottom: 30px;">
            <p style="font-size: 18px; color: var(--pkmn-blue); font-weight: bold; text-transform: uppercase;">
                {{ lobbyName }}
            </p>
            <p style="font-size: 14px; color: #666;">This room requires a password to join.</p>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input #passwordInput type="password" class="retro-input" [(ngModel)]="password"
                placeholder="Enter room password..." (keyup.enter)="join()" />
        </div>

        <div class="modal-actions">
            <button class="retro-btn confirm-btn" [disabled]="isInvalid()"
                (click)="join()">Join</button>
        </div>
    </div>
</div>
