<div class="retro-box match-browser">
  <div class="browser-header">
    <h2>Custom Matches</h2>
    <div class="header-actions">
      <button class="retro-btn refresh-btn">Refresh</button>
      <button class="retro-btn create-btn" (click)="createMatch()">Create Match</button>
    </div>
  </div>

  <div class="table-container">
    <table class="match-table">
      <thead>
        <tr>
          <th>Room Name</th>
          <th>Host</th>
          <th>Players</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        @for (item of matches | keyvalue; track item.key) {
        <tr>
          <td class="room-name">
            @if (item.value.hasPassword) {
            <span class="lock-icon">🔒</span>
            }
            {{ item.value.name }}
          </td>
          <td class="host-name">{{ item.value.hostId }}</td>
          <td class="players-count">{{ Object.keys(item.value.readys).length }}/2</td>
          <td>
            <button class="retro-btn join-btn"
              [disabled]="Object.keys(item.value.readys).length >= 2 && item.value.hostId !== currentUser"
              (click)="joinMatch(item.key, item.value)">
              Join
            </button>
          </td>
        </tr>
        } @empty {
        <tr>
          <td colspan="4" class="empty-msg">No matches found. Create one!</td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
