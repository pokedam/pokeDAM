<div class="avatar-grid">
  @for (pokemon of available; track pokemon.id) {
  <button type="button" class="avatar-option" [class.selected]="selectedIndexes.includes(pokemon.id)"
    (click)="selectPokemon(pokemon.id)" [title]="pokemon.name">
    <img [src]="sprite(pokemon)" [alt]="pokemon.name" />
    <span class="avatar-id">#{{ pokemon.id }}</span>
  </button>
  }
</div>
