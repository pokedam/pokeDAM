<app-content-header [title]="'Custom Matches'">
  <button class="retro-btn create-lobby-btn" (click)="createLobby()">Create Match</button>
</app-content-header> 

<div class="message-container">
  <div class="message-label">Custom Message</div>
  <input type="text" class="retro-input message-input" placeholder="Write a message" [(ngModel)]="message"/>
</div>

<div class="table-container">
  <table class="lobby-table">
    <thead>
      <tr>
        <th>Room Name</th>
        <th>Players</th>
        <th>Action</th>
      </tr>
    </thead>
    @if(lobbies){
    <tbody>
      @for (item of lobbies | keyvalue; track item.key) {
      <tr>
        <td class="lobby-name">
          @if (item.value.hasPassword) {
          <span class="lock-icon">🔒</span>
          }
          {{ item.value.name }}
        </td>
        <td class="players-count">{{ item.value.playerCount }}/{{ item.value.maxPlayers }}</td>
        <td>
          <button class="retro-btn action-btn join-btn" [disabled]="item.value.playerCount >= item.value.maxPlayers"
            (click)="joinLobby(item.key, item.value, message)">
            Join
          </button>
        </td>
      </tr>
      } @empty {
      <tr>
        <td colspan="4" class="empty-msg">No matches found. Create one!</td>
      </tr>
      }
    </tbody>
    }
  </table>
</div>
