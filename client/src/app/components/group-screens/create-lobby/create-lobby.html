<app-content-header [title]="'Create Custom Match'">
    <button class="retro-btn cancel-btn" (click)="cancel()">Back</button>
</app-content-header>

<div class="form-container"
    style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="retro-box form-box"
        style="width: 450px; background-color: var(--pkmn-gb-light); padding: 30px; box-shadow: 4px 4px 0px rgba(0,0,0,0.1);">
        <div class="form-group">
            <label>Room Name:</label>
            <input #nameInput type="text" class="retro-input" [(ngModel)]="name" placeholder="Enter room name..." />
        </div>

        <div class="form-group checkbox-group">
            <label class="retro-checkbox-label">
                <input type="checkbox" [(ngModel)]="hasPassword" (ngModelChange)="onPasswordToggle($event)" />
                <span>Require Password</span>
            </label>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input #passwordInput type="password" class="retro-input" [disabled]="!hasPassword" [(ngModel)]="password"
                placeholder="Enter room password..." />
        </div>


        <div class="modal-actions">
            <button class="retro-btn confirm-btn" [disabled]="hasValidPassword()"
                (click)="createLobby()">Create</button>
        </div>
    </div>
</div>
