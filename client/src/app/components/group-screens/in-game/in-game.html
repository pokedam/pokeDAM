<div class="in-game-container">
  <!-- Top section for battle visuals, etc. -->
  <!-- <div class="retro-box battle-scene"> -->
  <div class="players-grid" [class.locked]="false">
    @for (player of players(); track player.id) {
    <app-player-tile [player]="player" [selectableFn]="getSelector()" (pokemonSelect)="onPokemonSelect($event)">
    </app-player-tile>
    }
  </div>
  <!-- </div> -->

  <!-- Bottom panel with retro style UI -->
  <div class="bottom-panel">
    <!-- Action Menu (Left) -->

    <div class="retro-box actions-menu single-action">
      <button class="retro-btn action-btn main-action" (click)="onPokemonButtonClick()">
        CANCELAR
      </button>
    </div>


    <!-- Dialogue Box (Right) -->
    <div class="dialogue-section">
      @if (state.type === 'play') {
      <app-dialogue [text]="'Hola ke ase'"></app-dialogue>
      } @else if (state.type === 'mov-selection') {
      <div class="retro-box attacks-box">
        <div class="attacks-grid">
          @for (mov of state.selectedPokemon.movs; track mov){
          <button class="retro-btn action-btn attack-btn" (click)="onAttackSelect(mov.key)">
            <span class="attack-name">{{ mov.key }}</span>
            
          </button>
          }
          <!-- @for (mov of selectedOurPokemon?.movs; track mov) {
          <button class="retro-btn action-btn attack-btn" (click)="onAttackSelect(mov.key)">
            <span class="attack-name">{{ mov.key }}</span>
             <span class="attack-type">{{ attack.type }}</span> 
          </button>
          } -->
        </div>
      </div>
      } @else if (currentMenu === 'target-selection') {
      <div class="retro-box attacks-box target-box">
        <p class="target-text">
          Selecciona XXX objetivo(s).<br>
          <!--<small>(Elegidos: {{ selectedTargets.length }})</small> -->
        </p>
      </div>
      }
    </div>
  </div>
</div>
